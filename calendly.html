<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="assets/favicon.png">
<title>Gratis gesprek plannen — BuildProof</title>
<link rel="stylesheet" href="assets/buildproof-tokens.css">
<link rel="stylesheet" href="site.css">
<style>
  .cal-page { min-height: 100vh; display: flex; flex-direction: column; }
  .cal-body { flex: 1; padding: 48px 0 64px; }
  .cal-intro { text-align: center; margin-bottom: 36px; }
  .cal-intro h1 { font-family: var(--font-body); font-weight: 900; font-size: 36px; color: var(--ink-900); margin: 0 0 12px; }
  .cal-intro p { font-size: 18px; color: var(--ink-700); margin: 0; }
  .cal-embed { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-lg); }
  @media (max-width: 767px) {
    .cal-body { padding: 32px 0 48px; }
    .cal-intro h1 { font-size: 26px; }
    .cal-intro p { font-size: 16px; }
    .cal-embed iframe { height: 600px; }
  }
</style>
</head>
<body class="cal-page">

<header class="site-header">
  <div class="wrap header-row">
    <a class="header-logo" href="index.html" aria-label="BuildProof"><img src="assets/buildproof-logo.png" alt="BuildProof"></a>
    <div class="header-actions">
      <a href="calendly.html" class="btn btn-gold">Probeer het gratis</a>
      <a href="demo.html" class="btn btn-dark">Vraag een demo aan</a>
      <button class="m-burger" aria-label="Menu" onclick="void(0)">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="cal-body">
  <div class="wrap">
    <div class="cal-intro">
      <h1>Plan een kort gesprek</h1>
      <p>Kies een moment dat jou uitkomt — we nemen je in 15 minuten mee door BuildProof.</p>
    </div>
    <div class="cal-embed">
      <iframe
        src="https://calendly.com/buildproof-nl/kort-gesprek"
        width="100%"
        height="720"
        frameborder="0"
        scrolling="no"
        title="Plan een gesprek via Calendly">
      </iframe>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="wrap">
    <div class="footer-brand">
      <img src="assets/buildproof-logo.png" alt="BuildProof">
      <p class="copy" id="footer-copy"></p>
    </div>
  </div>
</footer>

<script>
  var c = document.getElementById('footer-copy');
  if (c) c.textContent = 'Copyright © ' + new Date().getFullYear() + ' BuildProof';
</script>
</body>
</html>
